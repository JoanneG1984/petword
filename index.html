<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Day 1 单词闯关</title>
  <style>
    :root {
      --ink: #263238;
      --muted: #66757f;
      --paper: #fffdf8;
      --line: #dfe8e3;
      --mint: #53b788;
      --mint-dark: #24795a;
      --sun: #ffbe4d;
      --rose: #ff6b6b;
      --sky: #4dabf7;
      --violet: #7b61ff;
      --shadow: 0 16px 36px rgba(35, 71, 61, .14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 190, 77, .24), transparent 24%),
        radial-gradient(circle at 82% 8%, rgba(77, 171, 247, .22), transparent 25%),
        linear-gradient(135deg, #f2fff8 0%, #fff8ec 52%, #eff7ff 100%);
      min-height: 100vh;
    }

    button, input { font: inherit; }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .hero {
      min-height: 178px;
      border: 1px solid rgba(83, 183, 136, .28);
      border-radius: 8px;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, .9), rgba(255, 255, 255, .64)),
        url("data:image/svg+xml,%3Csvg width='900' height='260' viewBox='0 0 900 260' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='900' height='260' fill='%23f6fff8'/%3E%3Cpath d='M0 205c82-36 153-37 213-3 64 36 124 33 181-2 68-41 137-39 205 8 68 46 151 42 301-18v70H0z' fill='%23b9ead2'/%3E%3Cpath d='M83 167h76l38 53H43z' fill='%234dabf7'/%3E%3Cpath d='M116 123h74l40 97h-42z' fill='%23ffd166'/%3E%3Cpath d='M557 128h164v92H557z' fill='%23ffffff'/%3E%3Cpath d='M585 160h39v60h-39zM654 160h39v60h-39z' fill='%238bd8bd'/%3E%3Ccircle cx='745' cy='202' r='18' fill='%2324795a'/%3E%3Ccircle cx='807' cy='202' r='18' fill='%2324795a'/%3E%3Cpath d='M728 154h87l31 43H707z' fill='%23ffbe4d'/%3E%3Cpath d='M352 171c18-32 39-32 58 0 25-49 58-49 88 0z' fill='%237b61ff' opacity='.75'/%3E%3C/svg%3E");
      background-size: cover;
      background-position: center;
      box-shadow: var(--shadow);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .user-panel {
      display: flex;
      gap: 8px;
      align-items: center;
      border: 1px solid rgba(36, 121, 90, .18);
      background: rgba(255, 255, 255, .82);
      border-radius: 8px;
      padding: 8px;
      min-width: min(100%, 360px);
    }

    .user-panel span {
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .user-panel input,
    .user-panel select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      flex: 1;
      min-width: 90px;
      background: white;
    }

    .login-status {
      color: var(--mint-dark);
      font-size: 13px;
      font-weight: 800;
      min-height: 20px;
      padding-left: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: 0;
      line-height: 1.08;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 620px;
      line-height: 1.6;
    }

    .status {
      border-radius: 8px;
      border: 1px solid rgba(38, 50, 56, .1);
      background: rgba(255, 255, 255, .78);
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      min-height: 178px;
    }

    .stat {
      border-radius: 8px;
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 14px;
      min-width: 0;
    }

    .stat strong {
      display: block;
      font-size: 28px;
      line-height: 1.1;
      color: var(--mint-dark);
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .tab {
      border: 1px solid rgba(36, 121, 90, .22);
      background: rgba(255, 255, 255, .76);
      border-radius: 8px;
      padding: 13px 12px;
      cursor: pointer;
      color: var(--mint-dark);
      font-weight: 700;
      min-height: 50px;
      transition: transform .15s ease, background .15s ease, color .15s ease;
    }

    .tab:hover { transform: translateY(-1px); }

    .tab.active {
      background: var(--mint);
      color: white;
      border-color: var(--mint);
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel, .side {
      border-radius: 8px;
      border: 1px solid rgba(38, 50, 56, .1);
      background: rgba(255, 255, 255, .86);
      box-shadow: var(--shadow);
    }

    .panel { min-height: 520px; padding: 22px; }
    .side { padding: 18px; }

    .section-title {
      margin: 0 0 16px;
      font-size: 22px;
    }

    .side-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .side-head .section-title { margin: 0; }

    .small-btn {
      border: 1px solid var(--line);
      background: #e7f8ef;
      color: var(--mint-dark);
      border-radius: 8px;
      cursor: pointer;
      min-height: 36px;
      padding: 7px 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .download-status {
      min-height: 24px;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .download-status a {
      color: #1464a5;
      font-weight: 800;
    }

    .download-status textarea {
      width: 100%;
      min-height: 130px;
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      resize: vertical;
      font-size: 12px;
      line-height: 1.45;
    }

    .download-status button {
      margin-top: 8px;
    }

    .word-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .word-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-height: 128px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .word-card.mastered-card {
      background: #effff4;
      border-color: rgba(36, 121, 90, .45);
    }

    .word-card.weak-card {
      background: #fff1f1;
      border-color: rgba(255, 107, 107, .58);
    }

    .word-card.unlearned-card {
      background: #fff9df;
      border-color: rgba(255, 190, 77, .62);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
    }

    .status-pill.mastered { background: #dff7e8; color: var(--mint-dark); }
    .status-pill.weak { background: #ffe0e0; color: #b42323; }
    .status-pill.unlearned { background: #fff0b8; color: #8a5b00; }
    .status-pill.learning { background: #eef7ff; color: #1464a5; }

    .word-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .word {
      color: var(--mint-dark);
      font-size: 21px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .phonetic { color: var(--muted); font-size: 13px; }
    .meaning { font-weight: 700; }
    .example { color: var(--muted); line-height: 1.55; font-size: 16px; }
    .example-zh { color: #45625a; line-height: 1.5; font-size: 15px; }

    .selection-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f5fff8;
      color: var(--muted);
      font-weight: 800;
    }

    .selection-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .check-word {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: auto;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .check-word input {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .icon-btn, .btn {
      border: 0;
      cursor: pointer;
      border-radius: 8px;
      min-height: 42px;
      transition: transform .12s ease, opacity .12s ease;
    }

    .icon-btn {
      width: 42px;
      flex: 0 0 42px;
      background: #e7f8ef;
      color: var(--mint-dark);
      font-size: 20px;
    }

    .btn {
      background: var(--ink);
      color: white;
      padding: 10px 16px;
      font-weight: 800;
    }

    .btn.secondary { background: #e9f5ff; color: #1464a5; }
    .btn.sun { background: var(--sun); color: #4b3210; }
    .btn.rose { background: var(--rose); }
    .btn:disabled { opacity: .48; cursor: not-allowed; }
    .icon-btn:hover, .btn:hover { transform: translateY(-1px); }

    .quiz {
      display: grid;
      gap: 18px;
    }

    .prompt {
      border-radius: 8px;
      background: #f5fff8;
      border: 1px dashed rgba(36, 121, 90, .35);
      padding: 22px;
      min-height: 170px;
      display: grid;
      align-content: center;
      justify-items: center;
      text-align: center;
      gap: 12px;
    }

    .big-word {
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1.1;
      color: var(--mint-dark);
      font-weight: 900;
      overflow-wrap: anywhere;
      max-width: 100%;
    }

    .prompt-label {
      font-size: clamp(18px, 2.5vw, 29px);
    }

    .prompt small { color: var(--muted); font-size: 15px; }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .choice {
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      min-height: 72px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      line-height: 1.42;
      font-weight: 700;
    }

    .choice.correct { border-color: var(--mint); background: #e9fff2; }
    .choice.wrong { border-color: var(--rose); background: #fff0f0; }

    .answer-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 8px;
      min-height: 50px;
      padding: 0 14px;
      outline: 0;
      background: white;
    }

    input[type="text"]:focus { border-color: var(--sky); }

    .feedback {
      min-height: 28px;
      font-weight: 800;
      color: var(--mint-dark);
    }

    .progress {
      height: 12px;
      background: #edf2ee;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 16px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--mint), var(--sun));
      transition: width .25s ease;
    }

    .mini-list {
      display: grid;
      gap: 8px;
      max-height: 340px;
      overflow: auto;
      padding-right: 4px;
    }

    .mini-word {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
    }

    .badge {
      border-radius: 999px;
      background: #eef7ff;
      color: #1464a5;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .filter {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--muted);
      font-weight: 700;
    }

    .filter.active {
      background: #e7f8ef;
      color: var(--mint-dark);
      border-color: rgba(36, 121, 90, .25);
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 3;
    }

    .piece {
      position: absolute;
      width: 10px;
      height: 16px;
      top: -18px;
      animation: fall 1.1s ease-in forwards;
    }

    @keyframes fall {
      to { transform: translateY(105vh) rotate(520deg); opacity: .2; }
    }

    @media (max-width: 860px) {
      .topbar, .main { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .choices { grid-template-columns: 1fr; }
      .panel { min-height: 440px; }
    }

    @media (max-width: 540px) {
      .app { width: min(100% - 20px, 1180px); padding-top: 12px; }
      .hero, .panel, .side { padding: 16px; }
      .status { grid-template-columns: 1fr 1fr; padding: 12px; }
      .stat strong { font-size: 22px; }
      .tab { padding: 10px 8px; font-size: 14px; }
      .answer-row { flex-direction: column; align-items: stretch; }
      .hero-tools, .user-panel { align-items: stretch; flex-direction: column; }
      .user-panel { width: 100%; }
      .side-head { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="confetti" id="confetti"></div>
  <main class="app">
    <section class="topbar">
      <div class="hero">
        <div>
          <h1 id="appTitle">Day 1 单词闯关</h1>
          <p class="subtitle">听发音、选中文、拼单词、做听写。每一关都会记录掌握度，错词会自动进“再练一遍”。</p>
        </div>
        <div class="hero-tools">
          <button class="btn sun" id="dailyMission">开始综合挑战</button>
          <div class="user-panel">
            <span>Day</span>
            <select id="daySelect" aria-label="选择单词 Day"></select>
          </div>
          <div class="user-panel">
            <span>User ID</span>
            <input id="userIdInput" type="text" autocomplete="off" placeholder="例如 Amy 或 001">
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="密码">
            <button class="btn secondary" id="switchUser">登录</button>
          </div>
          <div class="login-status" id="loginStatus"></div>
        </div>
      </div>
      <aside class="status">
        <div class="stat"><strong id="score">0</strong><span>今日星星</span></div>
        <div class="stat"><strong id="streak">0</strong><span>连续答对</span></div>
        <div class="stat"><strong id="mastered">0</strong><span>已掌握</span></div>
        <div class="stat"><strong id="left">0</strong><span>待攻克</span></div>
      </aside>
    </section>

    <nav class="tabs" aria-label="练习模式">
      <button class="tab active" data-view="cards">词卡</button>
      <button class="tab" data-view="combined">综合练习</button>
      <button class="tab" data-view="spelling">拼写训练</button>
      <button class="tab" data-view="radar">复习雷达</button>
      <button class="tab" data-view="wrongbook">错题集</button>
    </nav>

    <section class="main">
      <div class="panel" id="panel"></div>
    </section>
  </main>

  <script>
    function defaultExample(word) {
      return `Please make a sentence with "${word}".`;
    }

    function makeWords(items) {
      return items.map(([word, zh, pos = "", example = "", exampleZh = ""]) => ({
        word,
        pos,
        zh,
        example: example || defaultExample(word),
        exampleZh
      }));
    }

      ]) },
      day2: { label: "Day 2", title: "Day 2 单词闯关", words: makeWords([
        ["bride","新娘"],["handsome","英俊的"],["cheek","面颊；脸颊"],["fountain","喷泉"],["mate","朋友；同伴"],["ladder","梯子"],["mend","修理；好转"],["loan","贷款；借款"],["property","财产；房地产"],["flatmate","合住公寓者"],["kid","孩子"],["bath","洗澡"],["apartment block","公寓大楼"],["dustbin","垃圾箱"],["bulb","电灯泡"],["repair","修理"],["pipe","管子；管道"],["electrical","电的；用电的"],["heater","加热器"],["microwave","微波炉"],["freezer","冷冻柜"],["situated","位于；坐落在"],["neighbourhood","街区；附近"],["tube","伦敦地铁"],["line","铁道；线条"],["balcony","阳台"],["look up","仰望；查阅"],["occasionally","偶尔"],["lock","锁；锁上"],["alarm","闹钟；警报器"],["ground","地面"],["dust","灰尘"],["dishwasher","洗碗机"],["kettle","水壶"],["air conditioning","空调"],["central heating","中央暖气"],["load","负载；沉重感"],["bring up","提出；养育"],["messy","凌乱的"],["dusty","布满灰尘的"],["tidy up","收拾；整理"]
      ]) },
      day3: { label: "Day 3", title: "Day 3 单词闯关", words: makeWords([
        ["qualified","合格的；有资格的"],["education","教育"],["expert","专家；行家"],["familiar","熟悉的；常见的"],["basic","基本的；基础的"],["law","法律；规律"],["attend","出席；参加"],["primary","主要的；小学的"],["secondary school","中学"],["drama","戏剧"],["economics","经济学"],["graduation","毕业；毕业典礼"],["certificate","证明；证书"],["choice","选择"],["keep on","继续"],["essential","必要的；基本的"],["knowledge","知识；学问"],["grammar","语法"],["vocabulary","词汇；词汇量"],["topic","话题"],["nature studies","自然课"],["curriculum","课程"],["literature","文学"],["arithmetic","算术"],["technology","科技"],["engineering","工程；工程学"],["entry","进入；入口"],["research","研究；调查"],["fee","费用"],["grant","拨款；补助金"],["break","间歇；休息"],["questionnaire","问卷"],["hand out","分发"]
      ]) },
      day4: { label: "Day 4", title: "Day 4 单词闯关", words: makeWords([
        ["elementary","初级的；基础的"],["ability","能力；才能"],["alphabet","字母表"],["consonant","辅音"],["vowel","元音"],["pronounce","发音"],["word","单词；词"],["handwriting","书写；笔迹"],["bell","铃声；电铃"],["absent","缺席的"],["solution","解决办法"],["exact","精确的；准确的"],["solve","解决；处理"],["in order to","为了"],["keep up","跟上"],["register","登记；注册"],["revise","复习"],["hand in","提交；上交"],["composition","作文"],["talented","有才能的"],["search","搜索"],["information","信息"],["pronunciation","发音"],["exam","考试"]

    function cleanUserId(value) {
      const text = String(value || "").trim();
      return text || "default";
    }

    function encodePassword(value) {
      try {
        return btoa(unescape(encodeURIComponent(String(value || ""))));
      } catch (error) {
        return String(value || "");
      }
    }

    function passwordKey(userId) {
      return `wordPractice:user:${cleanUserId(userId)}:password`;
    }

    function verifyUserPassword(userId, password) {
      const cleanId = cleanUserId(userId);
      const text = String(password || "");
      const saved = readLocal(passwordKey(cleanId), "");
      if (saved) {
        if (saved === encodePassword(text)) return true;
        alert("密码不正确，请重新输入。");
        return false;
      }
      if (!text.trim()) {
        alert("请先输入密码。第一次使用这个 User ID 时，会用这个密码建立本地记录。");
        return false;
      }
      try {
        localStorage.setItem(passwordKey(cleanId), encodePassword(text));
      } catch (error) {
        alert("浏览器没有允许保存密码，暂时不能切换用户。");
        return false;
      }
      alert(`已为 ${cleanId} 设置本地登录密码，并加载之前保存的学习记录。`);
      return true;
    }

      const value = Number(readLocal(`wordPractice:${day}:${userId}:${name}`, "0"));
      return Number.isFinite(value) ? value : 0;
    }

    words = wordSets[activeDayKey()].words;

    const state = {
      userId: activeUserKey(),
      day: activeDayKey(),
      view: "cards",
      filter: "all",
      current: null,
      locked: false,
      streak: loadNumber(activeUserKey(), "streak", activeDayKey()),
      score: loadNumber(activeUserKey(), "score", activeDayKey()),
      attempts: loadAttempts(activeUserKey(), activeDayKey()),
      wrongBook: loadWrongBook(activeUserKey(), activeDayKey()),
      masteredBook: loadMasteredBook(activeUserKey(), activeDayKey()),
      selectedWords: loadSelectedWords(activeUserKey(), activeDayKey()),
      queueIndex: loadNumber(activeUserKey(), "queueIndex", activeDayKey()),
      wrongIndex: loadNumber(activeUserKey(), "wrongIndex", activeDayKey())
    };

    const panel = document.querySelector("#panel");
    let miniList = document.querySelector("#miniList");
    const scoreEl = document.querySelector("#score");
    const streakEl = document.querySelector("#streak");
    const masteredEl = document.querySelector("#mastered");
    const leftEl = document.querySelector("#left");
    let barEl = document.querySelector("#bar");
    const userIdInput = document.querySelector("#userIdInput");
    const passwordInput = document.querySelector("#passwordInput");
    const loginStatus = document.querySelector("#loginStatus");
    const daySelect = document.querySelector("#daySelect");
    const appTitle = document.querySelector("#appTitle");
    let downloadWrongBtn = document.querySelector("#downloadWrong");
    let downloadStatus = document.querySelector("#downloadStatus");

    function save() {
      try {
        localStorage.setItem("day19ActiveUser", state.userId);
        localStorage.setItem("wordPracticeActiveDay", state.day);
        localStorage.setItem("wordPracticeActiveDayV2", state.day);
        localStorage.setItem(storageKey("attempts"), JSON.stringify(state.attempts));
        localStorage.setItem(storageKey("wrongBook"), JSON.stringify(state.wrongBook));
        localStorage.setItem(storageKey("masteredBook"), JSON.stringify(state.masteredBook));
        localStorage.setItem(storageKey("selectedWords"), JSON.stringify(state.selectedWords));
        localStorage.setItem(storageKey("queueIndex"), String(state.queueIndex));
        localStorage.setItem(storageKey("wrongIndex"), String(state.wrongIndex));
        localStorage.setItem(storageKey("score"), String(state.score));
        localStorage.setItem(storageKey("streak"), String(state.streak));
      } catch (error) {
        // The app still works when opened as a local file in strict browsers.
      }
    }

    function loadProfile() {
      words = wordSets[state.day].words;
      state.score = loadNumber(state.userId, "score", state.day);
      state.streak = loadNumber(state.userId, "streak", state.day);
      state.attempts = loadAttempts(state.userId, state.day);
      state.wrongBook = loadWrongBook(state.userId, state.day);
      state.masteredBook = loadMasteredBook(state.userId, state.day);
      state.selectedWords = loadSelectedWords(state.userId, state.day);
      state.queueIndex = loadNumber(state.userId, "queueIndex", state.day);
      state.wrongIndex = loadNumber(state.userId, "wrongIndex", state.day);
      syncMasteredBook();
    }

    function switchUser(userId, password) {
      if (!verifyUserPassword(userId, password)) return;
      save();
      state.userId = cleanUserId(userId);
      loadProfile();
      if (userIdInput) userIdInput.value = state.userId;
      if (passwordInput) passwordInput.value = "";
      updateLoginStatus();
      save();
      render();
    }

    function updateLoginStatus() {
      if (!loginStatus) return;
      const mastered = state.masteredBook?.length || 0;
      const wrong = words.filter(isWeak).length;
      loginStatus.textContent = `已登录：${state.userId}，已掌握 ${mastered} 个，错题 ${wrong} 个`;
    }

    function switchDay(day) {
      if (!wordSets[day]) return;
      save();
      state.day = day;
      state.view = "cards";
      state.filter = "all";
      state.locked = false;
      loadProfile();
      updateLoginStatus();
      save();
      render();
    }

    function renderDayOptions() {
      daySelect.innerHTML = Object.entries(wordSets)
        .map(([key, set]) => `<option value="${key}">${set.label}</option>`)
        .join("");
      daySelect.value = state.day;
    }

    function wordStats(word) {
      return state.attempts[word.word] || { right: 0, wrong: 0 };
    }

    function masteredRecord(word) {
      return (state.masteredBook || []).find(item => item.word === word.word);
    }

    function isMastered(word) {
      const s = wordStats(word);
      return s.right >= MASTERY_TARGET || Boolean(masteredRecord(word));
    }

    function isWeak(word) {
      const s = wordStats(word);
      return state.wrongBook.includes(word.word) && !isMastered(word);
    }

    function activePracticeWords() {
      return words.filter(word => !isMastered(word));
    }

    function speak(text, slow = false) {
      if (!("speechSynthesis" in window)) return;
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = slow ? 0.72 : 0.86;
      utterance.pitch = 1.03;
      speechSynthesis.speak(utterance);
    }

    function sample(list, count) {
      const copy = [...list].sort(() => Math.random() - .5);
      return copy.slice(0, count);
    }

    function selectedWordSet() {
      return new Set(state.selectedWords || []);
    }

    function selectedPool() {
      const selected = selectedWordSet();
      const pool = words.filter(word => selected.has(word.word) && !isMastered(word));
      if (pool.length) return pool;
      if (words.some(word => selected.has(word.word))) return [];
      return activePracticeWords();
    }

    function renderPracticeComplete(mode) {
      const selectedCount = words.filter(isSelectedForQuiz).length;
      const title = mode === "spelling" ? "拼写训练" : "综合练习";
      const message = selectedCount
        ? `勾选的 ${selectedCount} 个单词都已掌握，无需重复出现。`
        : "当天单词都已掌握，无需重复出现。";
      panel.innerHTML = `
        <div class="quiz">
          <h2 class="section-title">${title}</h2>
          <div class="prompt">
            <div class="big-word prompt-label">已掌握</div>
            <small>${message}</small>
          </div>
          <button class="btn secondary" id="backToCards">回到词卡</button>
          <button class="btn secondary" id="openMastered">查看已掌握词库</button>
        </div>
      `;
      document.querySelector("#backToCards").addEventListener("click", () => {
        state.view = "cards";
        render();
      });
      document.querySelector("#openMastered").addEventListener("click", () => {
        state.view = "radar";
        state.filter = "mastered";
        render();
      });
    }

    function recordMasteredWord(word) {
      state.wrongBook = state.wrongBook.filter(wordText => wordText !== word.word);
      if (masteredRecord(word)) return;
      const s = wordStats(word);
      state.masteredBook.push({
        word: word.word,
        zh: word.zh,
        example: word.example,
        masteredAt: new Date().toISOString(),
        right: s.right,
        wrong: s.wrong
      });
    }

    function syncMasteredBook() {
      let changed = false;
      words.forEach(word => {
        const s = wordStats(word);
        if (s.right >= MASTERY_TARGET && !masteredRecord(word)) {
          recordMasteredWord(word);
          changed = true;
        }
        if (isMastered(word) && state.wrongBook.includes(word.word)) {
          state.wrongBook = state.wrongBook.filter(wordText => wordText !== word.word);
          changed = true;
        }
      });
      if (changed) save();
    }

    function isSelectedForQuiz(word) {
      return selectedWordSet().has(word.word);
    }

    function cardStatus(word) {
      const s = wordStats(word);
      if (isMastered(word)) return { className: "mastered-card", label: "已掌握", pill: "mastered" };
      if (isWeak(word)) return { className: "weak-card", label: "错题", pill: "weak" };
      if (s.right === 0 && s.wrong === 0) return { className: "unlearned-card", label: "未学习", pill: "unlearned" };
      return { className: "learning-card", label: `学习中 ${s.right}/${MASTERY_TARGET}`, pill: "learning" };
    }

    function updateSelectedWords(wordText, checked) {
      const selected = selectedWordSet();
      if (checked) {
        selected.add(wordText);
      } else {
        selected.delete(wordText);
      }
      state.selectedWords = words
        .filter(word => selected.has(word.word))
        .map(word => word.word);
      save();
    }

    function pickWord(source = "all") {
      if (source === "wrong") {
        const wrongWords = words.filter(isWeak);
        if (!wrongWords.length) return null;
        const word = wrongWords[state.wrongIndex % wrongWords.length];
        state.wrongIndex += 1;
        save();
        return word;
      }
      const pool = source === "selected" ? selectedPool() : activePracticeWords();
      if (!pool.length) return null;
      const word = pool[state.queueIndex % pool.length];
      state.queueIndex += 1;
      save();
      return word;
    }

    function normalize(text) {
      return text.trim().toLowerCase().replace(/\s+/g, " ").replace(/[’']/g, "'");
    }

    function escapeCell(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function csvCell(value) {
      return String(value ?? "")
        .replace(/"/g, "")
        .replace(/,/g, "，")
        .replace(/\r?\n/g, " ");
    }

    function copyWrongText() {
      const textArea = document.querySelector("#wrongCsvText");
      if (!textArea) return;
      textArea.focus();
      textArea.select();
      try {
        document.execCommand("copy");
        document.querySelector("#copyStatus").textContent = "已复制，可以直接粘贴到 Excel。";
      } catch (error) {
        document.querySelector("#copyStatus").textContent = "请按 Ctrl+C 复制，再粘贴到 Excel。";
      }
    }

    function downloadWrongWords() {
      const wrongWords = words.filter(isWeak);
      if (!wrongWords.length) {
        downloadStatus.textContent = "当前没有错词。";
        return;
      }
      const headers = ["Word", "中文意思", "Example"];
      const csvRows = [headers.map(csvCell).join(",")];
      const rows = wrongWords.map(word => {
        csvRows.push([word.word, word.zh, word.example].map(csvCell).join(","));
        return `
          <tr>
            <td>${escapeCell(word.word)}</td>
            <td>${escapeCell(word.zh)}</td>
            <td>${escapeCell(word.example)}</td>
          </tr>
        `;
      }).join("");
      const html = `
        <html>
          <head><meta charset="utf-8"></head>
          <body>
            <table border="1">
              <tr>
                <th>Word</th>
                <th>中文意思</th>
                <th>Example</th>
              </tr>
              ${rows}
            </table>
          </body>
        </html>
      `;
      const csvText = csvRows.join("\r\n");
      const blob = new Blob(["\ufeff", html], { type: "application/vnd.ms-excel;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const csvUrl = `data:text/csv;charset=utf-8,${encodeURIComponent("\ufeff" + csvText)}`;
      const link = document.createElement("a");
      const fileName = "Day19错词.xls";
      link.href = url;
      link.download = fileName;
      link.textContent = `点击这里保存 ${fileName}`;
      const csvLink = document.createElement("a");
      csvLink.href = csvUrl;
      csvLink.download = "Day19错词.csv";
      csvLink.textContent = "下载 CSV";
      link.click();
      downloadStatus.innerHTML = "";
      downloadStatus.append("如果没有自动下载，试试 ");
      downloadStatus.appendChild(link);
      downloadStatus.append(" 或 ");
      downloadStatus.appendChild(csvLink);
      downloadStatus.append("。下载仍被拦截时，可复制下面内容粘贴到 Excel。");
      const copyButton = document.createElement("button");
      copyButton.className = "small-btn";
      copyButton.type = "button";
      copyButton.textContent = "复制表格内容";
      copyButton.addEventListener("click", copyWrongText);
      const copyStatus = document.createElement("div");
      copyStatus.id = "copyStatus";
      const textArea = document.createElement("textarea");
      textArea.id = "wrongCsvText";
      textArea.value = csvText;
      downloadStatus.appendChild(copyButton);
      downloadStatus.appendChild(copyStatus);
      downloadStatus.appendChild(textArea);
      setTimeout(() => {
        URL.revokeObjectURL(url);
        if (link.parentNode) link.remove();
      }, 60000);
    }

    function mark(word, ok) {
      const s = wordStats(word);
      state.attempts[word.word] = { right: s.right + (ok ? 1 : 0), wrong: s.wrong + (ok ? 0 : 1) };
      if (!ok && !isMastered(word) && !state.wrongBook.includes(word.word)) {
        state.wrongBook.push(word.word);
      }
      if (isMastered(word)) {
        recordMasteredWord(word);
      }
      state.streak = ok ? state.streak + 1 : 0;
      state.score += ok ? 1 : 0;
      if (ok && state.streak > 0 && state.streak % 5 === 0) burst();
      save();
      renderStats();
    }

    function renderStats() {
      syncMasteredBook();
      const mastered = words.filter(isMastered).length;
      scoreEl.textContent = state.score;
      streakEl.textContent = state.streak;
      masteredEl.textContent = mastered;
      leftEl.textContent = words.length - mastered;
      if (barEl) barEl.style.width = `${Math.round(mastered / words.length * 100)}%`;
      renderMiniList();
    }

    function renderMiniList() {
      if (!miniList) return;
      const filtered = words.filter(word => {
        if (state.filter === "mastered") return isMastered(word);
        if (state.filter === "weak") return isWeak(word);
        return true;
      });
      miniList.innerHTML = filtered.map(word => {
        const s = wordStats(word);
        const record = masteredRecord(word);
        const date = record?.masteredAt ? new Date(record.masteredAt).toLocaleDateString() : "";
        const detail = record ? `<br><small>已掌握：${date || "已记录"}</small>` : "";
        const badge = isMastered(word) ? "掌握" : isWeak(word) ? "错题" : `${s.right}/${MASTERY_TARGET}`;
        return `<div class="mini-word"><span><b>${word.word}</b><br>${word.zh}${detail}</span><span class="badge">${badge}</span></div>`;
      }).join("");
    }

    function renderCards() {
      const selectedCount = words.filter(isSelectedForQuiz).length;
      panel.innerHTML = `
        <h2 class="section-title">先认识，再闯关</h2>
        <div class="selection-bar">
          <span>已勾选 ${selectedCount} 个；不勾选时，练习使用当天未掌握单词</span>
          <div class="selection-actions">
            <button class="small-btn" id="practiceSelected">送去综合练习</button>
            <button class="small-btn" id="spellSelected">送去拼写训练</button>
            <button class="small-btn" id="selectAllWords">全选本 Day</button>
            <button class="small-btn" id="clearSelectedWords">清空勾选</button>
          </div>
        </div>
        <div class="word-grid">
          ${words.map(word => {
            const status = cardStatus(word);
            return `
            <article class="word-card ${status.className}">
              <div class="word-head">
                <div>
                  <div class="word">${word.word}</div>
                  <div class="phonetic">${word.pos}</div>
                </div>
                <button class="icon-btn" title="播放发音" aria-label="播放 ${word.word}" data-say="${word.sound || word.word}">🔊</button>
              </div>
              <span class="status-pill ${status.pill}">${status.label}</span>
              <div class="meaning">${word.zh}</div>
              <div class="example">${word.example}</div>
              <div class="example-zh">${word.exampleZh}</div>
              <label class="check-word">
                <input type="checkbox" data-select-word="${encodeURIComponent(word.word)}" ${isSelectedForQuiz(word) ? "checked" : ""}>
                <span>加入练习词库</span>
              </label>
            </article>
          `}).join("")}
        </div>
      `;
      panel.querySelectorAll("[data-say]").forEach(btn => {
        btn.addEventListener("click", () => speak(btn.dataset.say, true));
      });
      panel.querySelectorAll("[data-select-word]").forEach(input => {
        input.addEventListener("change", () => {
          updateSelectedWords(decodeURIComponent(input.dataset.selectWord), input.checked);
          renderCards();
        });
      });
      document.querySelector("#selectAllWords").addEventListener("click", () => {
        state.selectedWords = words.map(word => word.word);
        save();
        renderCards();
      });
      document.querySelector("#practiceSelected").addEventListener("click", () => {
        state.view = "combined";
        render();
      });
      document.querySelector("#spellSelected").addEventListener("click", () => {
        state.view = "spelling";
        render();
      });
      document.querySelector("#clearSelectedWords").addEventListener("click", () => {
        state.selectedWords = [];
        save();
        renderCards();
      });
    }

    function bindRadarControls() {
      miniList = document.querySelector("#miniList");
      barEl = document.querySelector("#bar");
      downloadWrongBtn = document.querySelector("#downloadWrong");
      downloadStatus = document.querySelector("#downloadStatus");
      document.querySelectorAll(".filter").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.filter === state.filter);
        btn.addEventListener("click", () => {
          state.filter = btn.dataset.filter;
          document.querySelectorAll(".filter").forEach(item => item.classList.toggle("active", item === btn));
          renderMiniList();
        });
      });
      if (downloadWrongBtn) {
        downloadWrongBtn.addEventListener("click", downloadWrongWords);
      }
    }

    function renderRadar() {
      panel.innerHTML = `
        <h2 class="section-title">复习雷达</h2>
        <div class="progress" aria-label="掌握进度"><div class="bar" id="bar"></div></div>
        <div class="filters">
          <button class="filter" data-filter="all">全部</button>
          <button class="filter" data-filter="weak">错词</button>
          <button class="filter" data-filter="mastered">已掌握词库</button>
        </div>
        <div class="mini-list" id="miniList"></div>
      `;
      bindRadarControls();
    }

    function renderCombinedQuiz() {
      state.locked = false;
      const answer = pickWord("selected");
      if (!answer) {
        renderPracticeComplete("combined");
        return;
      }
      state.current = answer;
      const choices = sample(words.filter(w => w !== answer), 3).concat(answer).sort(() => Math.random() - .5);
      panel.innerHTML = `
        <div class="quiz">
          <h2 class="section-title">综合练习</h2>
          <div class="prompt">
            <button class="icon-btn" title="播放发音" id="sayPrompt">🔊</button>
            <div class="big-word prompt-label">听一听</div>
            <small>听英文，输入完整单词或短语，再直接选择中文意思。</small>
          </div>
          <div id="dictationStep">
            <div class="answer-row">
              <input id="answerInput" type="text" autocomplete="off" placeholder="听到什么就拼出来">
            </div>
          </div>
          <div class="choices" id="meaningStep">
            ${choices.map(choice => `<button class="choice" data-choice="${choice.word}">${choice.zh}</button>`).join("")}
          </div>
          <div class="feedback" id="feedback"></div>
          <button class="btn secondary" id="next">下一题</button>
        </div>
      `;
      const input = document.querySelector("#answerInput");
      document.querySelector("#sayPrompt").addEventListener("click", () => speak(answer.sound || answer.word, true));
      document.querySelector("#next").addEventListener("click", renderCombinedQuiz);
      input.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
        }
      });
      panel.querySelectorAll(".choice").forEach(btn => {
        btn.addEventListener("click", () => {
          if (state.locked) return;
          const dictationOk = normalize(input.value) === normalize(answer.word);
          const meaningOk = btn.dataset.choice === answer.word;
          input.disabled = true;
          btn.classList.add(meaningOk ? "correct" : "wrong");
          panel.querySelector(`[data-choice="${answer.word}"]`).classList.add("correct");
          panel.querySelectorAll(".choice").forEach(choice => choice.disabled = true);
          finishCombined(answer, dictationOk, meaningOk);
        });
      });
      setTimeout(() => speak(answer.sound || answer.word, true), 300);
      input.focus();
    }

    function checkCombinedDictation(input, answer, rememberResult) {
      if (state.locked || input.disabled) return;
      const spellingOk = normalize(input.value) === normalize(answer.word);
      const feedback = document.querySelector("#feedback");
      rememberResult(spellingOk);
      input.disabled = true;
      document.querySelector("#check").disabled = true;
      document.querySelector("#meaningStep").style.display = "grid";
      feedback.textContent = spellingOk
        ? "听写正确！现在选择中文意思。"
        : `听写答案是 ${answer.word}。现在选择中文意思。`;
      feedback.style.color = spellingOk ? "var(--mint-dark)" : "var(--rose)";
      speak(answer.sound || answer.word, true);
    }

    function finishCombined(answer, dictationOk, meaningOk) {
      const ok = dictationOk && meaningOk;
      state.locked = true;
      const feedback = document.querySelector("#feedback");
      feedback.textContent = ok
        ? `本题通过！${answer.word} = ${answer.zh}`
        : `本题进错题集：${answer.word} = ${answer.zh}`;
      feedback.style.color = ok ? "var(--mint-dark)" : "var(--rose)";
      mark(answer, ok);
      speak(answer.sound || answer.word, true);
    }

    function renderSpelling() {
      state.locked = false;
      const answer = pickWord("selected");
      if (!answer) {
        renderPracticeComplete("spelling");
        return;
      }
      state.current = answer;
      const choices = sample(words.filter(w => w !== answer), 3).concat(answer).sort(() => Math.random() - .5);
      panel.innerHTML = `
        <div class="quiz">
          <h2 class="section-title">拼写训练</h2>
          <div class="prompt">
            <button class="icon-btn" title="播放发音" id="sayPrompt">🔊</button>
            <div class="big-word prompt-label">听音拼写</div>
            <small>听英文，输入完整单词或短语，再直接选择中文意思。</small>
            <button class="btn secondary" id="sayAgain">听一遍</button>
          </div>
          <div class="answer-row">
            <input id="answerInput" type="text" autocomplete="off" placeholder="输入完整英文">
          </div>
          <div class="choices" id="meaningStep">
            ${choices.map(choice => `<button class="choice" data-choice="${choice.word}">${choice.zh}</button>`).join("")}
          </div>
          <div class="feedback" id="feedback"></div>
          <button class="btn secondary" id="next">下一题</button>
        </div>
      `;
      const input = document.querySelector("#answerInput");
      panel.querySelectorAll("#sayPrompt, #sayAgain").forEach(btn => {
        btn.addEventListener("click", () => speak(answer.sound || answer.word, true));
      });
      document.querySelector("#next").addEventListener("click", renderSpelling);
      input.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
        }
      });
      panel.querySelectorAll(".choice").forEach(btn => {
        btn.addEventListener("click", () => {
          if (state.locked) return;
          const dictationOk = normalize(input.value) === normalize(answer.word);
          const meaningOk = btn.dataset.choice === answer.word;
          input.disabled = true;
          btn.classList.add(meaningOk ? "correct" : "wrong");
          panel.querySelector(`[data-choice="${answer.word}"]`).classList.add("correct");
          panel.querySelectorAll(".choice").forEach(choice => choice.disabled = true);
          finishCombined(answer, dictationOk, meaningOk);
        });
      });
      setTimeout(() => speak(answer.sound || answer.word, true), 300);
      input.focus();
    }

    function renderWrongBook() {
      state.locked = false;
      const wrongWords = words.filter(isWeak);
      const answer = pickWord("wrong");
      if (!answer) {
        panel.innerHTML = `
          <div class="quiz">
            <h2 class="section-title">错题集</h2>
            <div class="prompt">
              <div class="big-word">目前没有错题</div>
              <small>去做几道选择、拼写或听写，点错的词会自动来到这里。</small>
            </div>
            <button class="btn secondary" id="backToPractice">去综合练习</button>
          </div>
        `;
        document.querySelector("#backToPractice").addEventListener("click", () => {
          state.view = "combined";
          render();
        });
        return;
      }
      state.current = answer;
      const choices = sample(words.filter(w => w !== answer), 3).concat(answer).sort(() => Math.random() - .5);
      panel.innerHTML = `
        <div class="quiz">
          <div class="side-head">
            <h2 class="section-title">错题集专练</h2>
            <button class="small-btn" id="downloadWrong">下载错词</button>
          </div>
          <div class="download-status" id="downloadStatus"></div>
          <div class="prompt">
            <button class="icon-btn" title="播放发音" id="sayPrompt">🔊</button>
            <div class="big-word prompt-label">错题听写</div>
            <small>错题 ${Math.min(state.wrongIndex, wrongWords.length)} / ${wrongWords.length}。输入英文后，选择中文意思。</small>
          </div>
          <div class="answer-row">
            <input id="answerInput" type="text" autocomplete="off" placeholder="重新拼出这个错词">
          </div>
          <div class="choices" id="meaningStep">
            ${choices.map(choice => `<button class="choice" data-choice="${choice.word}">${choice.zh}</button>`).join("")}
          </div>
          <div class="feedback" id="feedback"></div>
          <button class="btn secondary" id="next">下一道错题</button>
          <button class="btn secondary" id="clearMastered">移出已掌握</button>
        </div>
      `;
      downloadWrongBtn = document.querySelector("#downloadWrong");
      downloadStatus = document.querySelector("#downloadStatus");
      if (downloadWrongBtn) {
        downloadWrongBtn.addEventListener("click", downloadWrongWords);
      }
      const input = document.querySelector("#answerInput");
      document.querySelector("#sayPrompt").addEventListener("click", () => speak(answer.sound || answer.word, true));
      document.querySelector("#next").addEventListener("click", renderWrongBook);
      document.querySelector("#clearMastered").addEventListener("click", () => {
        state.wrongBook = state.wrongBook.filter(wordText => {
          const word = words.find(item => item.word === wordText);
          return word && !isMastered(word);
        });
        save();
        render();
      });
      input.addEventListener("keydown", event => {
        if (event.key === "Enter") event.preventDefault();
      });
      panel.querySelectorAll(".choice").forEach(btn => {
        btn.addEventListener("click", () => {
          if (state.locked) return;
          const dictationOk = normalize(input.value) === normalize(answer.word);
          const meaningOk = btn.dataset.choice === answer.word;
          input.disabled = true;
          btn.classList.add(meaningOk ? "correct" : "wrong");
          panel.querySelector(`[data-choice="${answer.word}"]`).classList.add("correct");
          panel.querySelectorAll(".choice").forEach(choice => choice.disabled = true);
          finishCombined(answer, dictationOk, meaningOk);
        });
      });
      setTimeout(() => speak(answer.sound || answer.word, true), 300);
      input.focus();
    }

    function checkTyped(input, answer) {
      if (state.locked) return;
      const ok = normalize(input.value) === normalize(answer.word);
      state.locked = true;
      const feedback = document.querySelector("#feedback");
      feedback.textContent = ok && state.view === "wrongbook" && isMastered(answer)
        ? `正确！${answer.word} 已掌握，可以移出错题集。`
        : ok ? `正确！${answer.word} = ${answer.zh}` : `再记一下：${answer.word} = ${answer.zh}`;
      feedback.style.color = ok ? "var(--mint-dark)" : "var(--rose)";
      mark(answer, ok);
      speak(answer.sound || answer.word, true);
    }

    function render() {
      appTitle.textContent = wordSets[state.day].title;
      if (daySelect.value !== state.day) daySelect.value = state.day;
      updateLoginStatus();
      document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.view === state.view));
      if (state.view === "cards") renderCards();
      if (state.view === "combined") renderCombinedQuiz();
      if (state.view === "spelling") renderSpelling();
      if (state.view === "radar") renderRadar();
      if (state.view === "wrongbook") renderWrongBook();
      renderStats();
    }

    function burst() {
      const confetti = document.querySelector("#confetti");
      const colors = ["#53b788", "#ffbe4d", "#ff6b6b", "#4dabf7", "#7b61ff"];
      for (let i = 0; i < 36; i++) {
        const piece = document.createElement("span");
        piece.className = "piece";
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = colors[i % colors.length];
        piece.style.animationDelay = `${Math.random() * .22}s`;
        confetti.appendChild(piece);
        setTimeout(() => piece.remove(), 1400);
      }
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        state.view = tab.dataset.view;
        render();
      });
    });

    document.querySelector("#dailyMission").addEventListener("click", () => {
      state.view = "combined";
      render();
    });

    renderDayOptions();
    userIdInput.value = state.userId;

    daySelect.addEventListener("change", () => {
      switchDay(daySelect.value);
    });

    document.querySelector("#switchUser").addEventListener("click", () => {
      switchUser(userIdInput.value, passwordInput.value);
    });

    userIdInput.addEventListener("keydown", event => {
      if (event.key === "Enter") switchUser(userIdInput.value, passwordInput.value);
    });

    passwordInput.addEventListener("keydown", event => {
      if (event.key === "Enter") switchUser(userIdInput.value, passwordInput.value);
    });

    if (downloadWrongBtn) {
      downloadWrongBtn.addEventListener("click", downloadWrongWords);
    }

    render();
  </script>
</body>
</html>
